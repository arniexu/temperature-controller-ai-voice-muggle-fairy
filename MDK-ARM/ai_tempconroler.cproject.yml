project:
  packs:
    - pack: ARM::CMSIS@^6.2.0
    - pack: Keil::STM32F4xx_DFP@^2.17.1
    - pack: ARM::CMSIS-NN@^4.0.0
    - pack: ARM::CMSIS-DSP@^1.10.1
  setups:
    - setup: Options for ai_tempconroler
      processor:
        fpu: sp
      add-path:
        - ../Core/Inc
        - ../FATFS/Target
        - ../FATFS/App
        - ../LIBJPEG/App
        - ../LIBJPEG/Target
        - ../Drivers/STM32F4xx_HAL_Driver/Inc
        - ../Drivers/STM32F4xx_HAL_Driver/Inc/Legacy
        - ../Middlewares/Third_Party/FreeRTOS/Source/include
        - ../Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS
        - ../Middlewares/Third_Party/FreeRTOS/Source/portable/RVDS/ARM_CM4F
        - ../Middlewares/Third_Party/FatFs/src
        - ../Middlewares/Third_Party/LibJPEG/include
        - ../Drivers/CMSIS/Device/ST/STM32F4xx/Include
        - ../Drivers/CMSIS/Include
      debug: "on"
      define:
        - USE_HAL_DRIVER
        - STM32F407xx
      misc:
        - C:
            - -std=c99
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -Wno-packed
            - -Wno-missing-variable-declarations
            - -Wno-missing-prototypes
            - -Wno-missing-noreturn
            - -Wno-sign-conversion
            - -Wno-nonportable-include-path
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --strict
            - --summary_stderr
            - --info summarysizes
  linker:
    - script: ai_tempconroler_ai_tempconroler.sct
  groups:
    - group: Application/MDK-ARM
      files:
        - file: startup_stm32f407xx.s
    - group: Application/User/Core
      files:
        - file: ../Core/Src/main.c
        - file: ../Core/Src/gpio.c
        - file: ../Core/Src/freertos.c
        - file: ../Core/Src/fsmc.c
        - file: ../Core/Src/stm32f4xx_it.c
        - file: ../Core/Src/stm32f4xx_hal_msp.c
        - file: ../Core/Src/stm32f4xx_hal_timebase_tim.c
    - group: Application/User/FATFS/Target
      files:
        - file: ../FATFS/Target/bsp_driver_sram.c
        - file: ../FATFS/Target/sram_diskio.c
    - group: Application/User/FATFS/App
      files:
        - file: ../FATFS/App/fatfs.c
    - group: Application/User/LIBJPEG/App
      files:
        - file: ../LIBJPEG/App/libjpeg.c
    - group: Application/User/LIBJPEG/Target
      files:
        - file: ../LIBJPEG/Target/jdata_conf.c
    - group: Drivers/STM32F4xx_HAL_Driver
      files:
        - file: ../Drivers/STM32F4xx_HAL_Driver/Src/stm32f4xx_hal_tim.c
        - file: ../Drivers/STM32F4xx_HAL_Driver/Src/stm32f4xx_hal_tim_ex.c
        - file: ../Drivers/STM32F4xx_HAL_Driver/Src/stm32f4xx_hal_rcc.c
